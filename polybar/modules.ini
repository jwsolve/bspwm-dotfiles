[module/xworkspaces]
type = internal/xworkspaces
format = <label-state>
label-font = 2
label-empty = ""
label-empty-foreground = ${colors.disabled}
label-active-foreground = ${colors.blue}
label-occupied-forground = ${colors.blue}

label-empty-padding = 1
label-active-padding = 1
label-occupied-padding = 1
label-urgent-padding = 1

[module/bspwm]
type = custom/script
exec = cat $HOME/.config/bspwm/script/current-layout
click-left = $HOME/.config/bspwm/script/switch-layouts
interval = 1
format = <label>
label = "   %output%"
label-font = 2
format-foreground = ${colors.foreground}
format-padding = 0

[module/launcher]
type = custom/text
format = ""
format-foreground = ${colors.foreground}
click-left = ~/.config/rofi/launchers/type-1/launcher.sh
format-padding = 2
format-font = 2

;; Application Launcher Module
[module/sysmenu]
type = custom/text
label-font = 1
label = ""
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}

click-left = /home/jwsolve/.config/rofi/powermenu/type-1/powermenu.sh

[module/tray]
type = custom/script
exec = tail -F $HOME/.config/bspwm/ryan/scripts/tray-status 2> /dev/null
click-left = $HOME/.config/bspwm/ryan/scripts/tray --toggle
tail = true
label = ""
label-font = 1
label-padding = 3

[module/date]
type = internal/date
interval = 1.0
date = %a, %d %b
time = %I:%M %p
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.red}
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume><label-volume>
format-volume-prefix-font = 1
format-volume-foreground= ${colors.green}

label-volume = " %percentage%% "
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = ""
format-muted-prefix-font = 1
format-muted-foreground = ${colors.red}
label-muted = " muted "
label-muted-foreground = ${colors.alert}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 
ramp-volume-4 = 
ramp-volume-font = 1
; Right and Middle click
click-right = openapps --soundcontrol
click-left = eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions

[module/seperator]
type = custom/text
content = "  "
content-font = 0

[module/microphone]
type = custom/script
exec = ~/.config/bspwm/ryan/scripts/microphone
click-left = eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions
interval = 5
format-padding = 1
format-background = ${colors.background-alt}
format-foreground = ${colors.yellow}

[module/clipboard]
type = custom/text
content = "󰅎"
content-padding = 1
;content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
;click-left = rofi -modi "clipboard:greenclip print" -theme "/home/ryan/.config/bspwm/scripts/rofi/config.rasi" -show clipboard -run-command '{cmd}'
click-left = openapps --clip

[module/brightness]
type = internal/backlight
card = acpi_video0

enable-scroll = false

format = <ramp><label>
label = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:} %percentage%%{A}"
label-background = ${colors.background-alt}
label-foreground = ${colors.foreground}

ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-2 = 󰃠
ramp-font = 1
ramp-foreground = ${colors.green}
ramp-background = ${colors.background-alt}

[module/close]
type = custom/text
content = "󰅙"
content-padding = 1
content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
click-left = bspc node -k

[module/float]
type = custom/text
content = "󰀽"
content-padding = 1
content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
click-left = buttonmin.sh

[module/xwindow]
type = internal/xwindow

; Available tags:
;   <label> (default)
format = <label>
format-foreground = ${colors.foreground}

; Available tokens:
;   %title%
; Default: %title%
label = " %title%"
label-maxlen = 30

; Used instead of label when there is no window title
label-empty = " Desktop"

[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
hwmon-path = /sys/class/thermal/thermal_zone0/hwmon1/temp1_input
warn-temperature = 80
units = true
label = %{A:cpu-x:} %temperature-c%%{A}
label-warn = %{A:cpu-x:} %temperature-c%%{A}

[module/filesystem]
type = internal/fs
label-mounted = %{A1:thunar:} %free%%{A}

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %{A:wattage:} %percentage%%%{A}
format-charging = %{A:wattage:}<animation-charging> <label-charging>%{A}
format-discharging = %{A:wattage:}<ramp-capacity> <label-discharging>%{A}
battery = BAT0
adapter = ADP1
poll-interval = 5
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
bar-capacity-width = 10

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
animation-discharging-3 = 
animation-discharging-4 = 
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/cpu]
type = internal/cpu
interval = 5
warn-percentage = 80
format = %{A:~/.config/polybar/scripts/cpu.sh --popup:}<label>%{A}
label =  %percentage%%
label-warn =  %percentage%%

[module/pacman-updates]
type = custom/script
;exec = pacman -Qu | wc -l
exec = checkupdates | wc -l
interval = 1000
label = Repo: %output%
format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-prefix = "🗘 "
format-prefix-foreground = ${colors.color2}
format-underline = ${colors.color2}
format-margin = 2
format-padding = 0
