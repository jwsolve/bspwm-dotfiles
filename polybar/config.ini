[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #e0af68
secondary = #9ece6a
alert = #db4b4b
disabled = #414868
blue = #7aa2f7
red = #f4155a
pink = #f200f4
purple = #6800d2
cyan = #4DD0E1
teal = #00B19F
green = #00ff00
lime = #8df202
yellow = #f2ed00
amber = #FBC02D
orange = #db330a
brown = #AC8476
grey = #8C8C8C
indigo = #8f32e4
bluegray = #1e80d2  

enable-ipc = true

[bar/ryan-bar]
monitor = ${env:MONITOR:}
width = 99%
height = 22
radius = 6
bottom = true
fixed-center = true
offset-x = 6
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1

border-size = 7pt
border-color = ${colors.background}

padding = 1

module-margin-left = 1
module-margin-right = 1

font-0 = DejavuSansMono:size=10;4
font-1 = FontAwesome5Free:style=Solid:size=10;4
font-2 = FontAwesome5Free:style=Regular:size=10;4
font-3 = FontAwesome5Brands:style=Regular:size=10;4

modules-left = launcher xworkspaces
modules-center = xwindow
modules-right = cpu temperature filesystem pulseaudio battery tray date sysmenu

cursor-click = pointer
cursor-scroll = ns-resize

wm-restack = bspwm

include-file = modules.ini 

[settings]
screenchange-reload = true
pseudo-transparency = true
