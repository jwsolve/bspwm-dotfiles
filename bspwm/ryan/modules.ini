[module/xworkspaces]
type = internal/xworkspaces
label-empty = ""
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

label-occupied = ""
label-occupied-forground = ${colors.blue}
label-occupied-padding = 1

label-active = ""
label-active-foreground = ${colors.blue}
label-active-padding = 1 


[module/bspwm]
type = custom/script
exec = cat $HOME/.config/bspwm/script/current-layout
click-left = $HOME/.config/bspwm/script/switch-layouts
interval = 1
format = <label>
label = "   %output%"
label-font = 2
format-foreground = ${colors.foreground}
format-padding = 0

[module/launcher]
type = custom/text
content = ""
content-foreground = ${colors.foreground}
click-left = ~/.config/rofi/launchers/type-1/launcher.sh
content-padding = 2
content-font = 1


[module/title]
type = internal/xwindow

format = <label>
format-prefix = "󰡽 "
format-prefix-foreground = ${colors.green}

label = %title%
label-maxlen = 40

label-empty = "Arch-Linux"
label-empty-foreground = ${colors.purple}

[module/spasi]
type = custom/text
content = " "
content-foreground = ${colors.blue}
content-font = 0

;; Application Launcher Module
[module/sysmenu]
type = custom/text

content = ""
content-background = black
content-foreground = green

click-left = /home/jwsolve/.config/rofi/powermenu/type-1/powermenu.sh

[module/tray]
type = custom/script
exec = tail -F $HOME/.config/bspwm/ryan/scripts/tray-status 2> /dev/null
click-left = $HOME/.config/bspwm/ryan/scripts/tray --toggle
tail = true
label = "󰄼"
label-font = 1
label-padding = 3

[module/date]
type = internal/date
interval = 1.0
date = %a, %d %b
time = %I:%M %p
format = <label>
format-prefix = " "
format-prefix-foreground = ${color.red}
label = %date% %time%

[module/network]
type = internal/network
interface = enp1s0f0
interface-type = wired
interval = 3.0
udspeed-minwidth = 5
accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-packetloss = <animation-packetloss> <label-connected>
label-connected = %downspeed:9%
label-connected-foreground = ${colors.foreground}
label-disconnected = not connected
label-disconnected-foreground = ${colors.foreground}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 20

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

; Available tags:
;   <label-charging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-charging>
format-charging = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:}<animation-charging>%{A}"

; Available tags:
;   <label-discharging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-discharging>
format-discharging = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:}<ramp-capacity>%{A}"

; Format used when battery level drops to low-at
; If not defined, format-discharging is used instead.
; Available tags:
;   <label-low>
;   <animation-low>
;   <bar-capacity>
;   <ramp-capacity>
; New in version 3.6.0
format-low = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:}<animation-low>%{A}"
format-full = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:}<ramp-capacity>%{A}"

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current charge rate in watts)
label-charging = %percentage%%
label-charging-padding = 1

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
label-discharging = %percentage%%
label-discharging-padding = 1

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
; New in version 3.6.0
label-low = %percentage%%
label-low-padding = 1

; Only applies if <animation-charging> is used
animation-charging-0 = " 󰂆 "
animation-charging-1 = " 󰂈 "
animation-charging-2 = " 󰂉 "
animation-charging-3 = " 󰂊 "
animation-charging-4 = " 󰂅 "
animation-charging-foreground = ${colors.secondary}
animation-charging-background = ${colors.background-alt}
animation-charging-font = 1
; Framerate in milliseconds
animation-charging-framerate = 750

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = " 󰁺 "
ramp-capacity-1 = " 󰁼 "
ramp-capacity-2 = " 󰁾 "
ramp-capacity-3 = " 󰂀 " 
ramp-capacity-4 = " 󰁹 "  
ramp-capacity-background = ${colors.background-alt}
ramp-capacity-font = 1

; Framerate in milliseconds
animation-discharging-framerate = 500

; Only applies if <animation-low> is used
; New in version 3.6.0
animation-low-0 = "󰁻 "
animation-low-1 = "󰁺 "
animation-low-framerate = 200
animation-low-background = ${colors.background-alt}
animation-low-font = 1
animation-low-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume><label-volume>
;format-volume-prefix = "󰕾"
format-volume-prefix-font = 1
format-volume-foreground= ${colors.green}

label-volume = " %percentage%% "
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = "󰝟"
format-muted-prefix-font = 1
format-muted-foreground = ${colors.red}
label-muted = " muted "
label-muted-foreground = ${colors.alert}

ramp-volume-0 = 
ramp-volume-1 = 󰕾
ramp-volume-2 = 󰕾
ramp-volume-3 = 󰕾
ramp-volume-4 = 󰕾
ramp-volume-font = 1
; Right and Middle click
click-right = openapps --soundcontrol
click-left = eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions


[module/seperator]
type = custom/text
content = "  "
content-font = 0

