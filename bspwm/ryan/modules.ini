[module/bluetooth]
type = custom/script
exec = ~/.config/bspwm/ryan/scripts/bluetooth
interval = 2
click-left = exec blueberry
click-right = exec ~/.config/bspwm/ryan/scripts/toggle-bluetooth
format-padding = 1
format-font = 1
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}

[module/microphone]
type = custom/script
exec = ~/.config/bspwm/ryan/scripts/microphone
click-left = eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions
interval = 5
format-padding = 1
format-background = ${colors.background-alt}
format-foreground = ${colors.yellow}

[module/clipboard]
type = custom/text
content = "󰅎"
content-padding = 1
;content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
;click-left = rofi -modi "clipboard:greenclip print" -theme "/home/ryan/.config/bspwm/scripts/rofi/config.rasi" -show clipboard -run-command '{cmd}'
click-left = openapps --clip

[module/brightness]
type = internal/backlight
card = acpi_video0

enable-scroll = false

format = <ramp><label>
label = "%{A1:eww -c ~/.config/bspwm/ryan/src/eww open --toggle actions:} %percentage%%{A}"
label-background = ${colors.background-alt}
label-foreground = ${colors.foreground}

ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-2 = 󰃠
ramp-font = 1
ramp-foreground = ${colors.green}
ramp-background = ${colors.background-alt}

[module/close]
type = custom/text
content = "󰅙"
content-padding = 1
content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
click-left = bspc node -k

[module/float]
type = custom/text
content = "󰀽"
content-padding = 1
content-background = ${colors.background-alt}
content-foreground = ${colors.blue}
click-left = buttonmin.sh

[module/xwindow]
type = internal/xwindow

; Available tags:
;   <label> (default)
format = <label>
format-prefix = 
format-foreground = ${color.foreground}

; Available tokens:
;   %title%
; Default: %title%
label = " %title%"
label-maxlen = 30

; Used instead of label when there is no window title
label-empty = " Desktop"

[module/updates]
type = custom/script
exec = ~/.config/bspwm/scripts/updates.sh
tail = true
interval = 5
format = <label>
format-prefix = 
format-prefix-foreground = ${color.yellow}
label = " %output%"
click-left = exo-open sudo pacman -Syyu

[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
hwmon-path = /sys/class/thermal/thermal_zone0/hwmon1/temp1_input
warn-temperature = 80
units = true
format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%
label-warn = "%temperature-c%"
label-warn-foreground = ${color.red}
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 
ramp-foreground = ${color.cyan}

[module/cpu]
type = internal/cpu
interval = 1
format = <label>
format-prefix = 
format-prefix-foreground = ${color.yellow}
label = " %percentage%%"
